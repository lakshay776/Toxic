<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Toxic Comment Detector</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #f5f0e8;
      --surface:  #ede8df;
      --border:   #c8bfaa;
      --text:     #1a1612;
      --subtext:  #6b6358;
      --accent:   #2d2926;
      --safe:     #2a7a3b;
      --safe-bg:  #d6f0da;
      --toxic:    #9b1c1c;
      --toxic-bg: #fde8e8;
      --pixel:    2px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
      background-image:
        linear-gradient(rgba(0,0,0,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,0,0,0.04) 1px, transparent 1px);
      background-size: 20px 20px;
    }

    /* ---- pixel box mixin ---- */
    .pixel-box {
      border: 2px solid var(--accent);
      box-shadow: 4px 4px 0 var(--accent);
      border-radius: 0;
    }

    /* ---- header ---- */
    header {
      text-align: center;
      margin-bottom: 32px;
    }

    .tag {
      display: inline-block;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      background: var(--accent);
      color: var(--bg);
      padding: 4px 10px;
      margin-bottom: 14px;
    }

    h1 {
      font-family: 'Space Mono', monospace;
      font-size: clamp(20px, 4vw, 30px);
      font-weight: 700;
      letter-spacing: -1px;
      line-height: 1.1;
      color: var(--text);
      margin-bottom: 8px;
    }

    header p {
      font-size: 13px;
      color: var(--subtext);
      max-width: 360px;
      margin: 0 auto;
    }

    /* ---- card ---- */
    .card {
      width: 100%;
      max-width: 580px;
      background: var(--surface);
      padding: 28px;
    }

    label.input-label {
      display: block;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--subtext);
      margin-bottom: 8px;
    }

    textarea {
      width: 100%;
      height: 140px;
      background: var(--bg);
      border: 2px solid var(--border);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      line-height: 1.6;
      padding: 12px 14px;
      resize: vertical;
      outline: none;
      transition: border-color .15s;
      border-radius: 0;
    }

    textarea:focus { border-color: var(--accent); }
    textarea::placeholder { color: var(--border); }

    .meta-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 6px;
      margin-bottom: 18px;
    }

    .char-count {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: var(--subtext);
    }

    .hint {
      font-size: 10px;
      color: var(--border);
    }

    /* ---- button ---- */
    .btn-row { display: flex; gap: 10px; }

    button {
      cursor: pointer;
      font-family: 'Space Mono', monospace;
      font-weight: 700;
      font-size: 12px;
      letter-spacing: 1px;
      text-transform: uppercase;
      border: 2px solid var(--accent);
      border-radius: 0;
      transition: all .1s;
    }

    #analyzeBtn {
      flex: 1;
      padding: 12px;
      background: var(--accent);
      color: var(--bg);
      box-shadow: 3px 3px 0 #888;
    }

    #analyzeBtn:hover:not(:disabled) {
      transform: translate(-1px, -1px);
      box-shadow: 4px 4px 0 #888;
    }

    #analyzeBtn:active:not(:disabled) {
      transform: translate(2px, 2px);
      box-shadow: 1px 1px 0 #888;
    }

    #analyzeBtn:disabled {
      opacity: .5;
      cursor: not-allowed;
      transform: none;
      box-shadow: 3px 3px 0 #888;
    }

    #clearBtn {
      padding: 12px 16px;
      background: transparent;
      color: var(--subtext);
      box-shadow: 3px 3px 0 var(--border);
    }

    #clearBtn:hover { color: var(--text); }

    /* ---- result ---- */
    #result {
      display: none;
      width: 100%;
      max-width: 580px;
      margin-top: 16px;
      animation: popIn .2s ease;
    }

    @keyframes popIn {
      from { opacity: 0; transform: translateY(6px) scale(.98); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .result-inner {
      padding: 22px;
      border: 2px solid;
    }

    .result-inner.safe  { background: var(--safe-bg);  border-color: var(--safe);  box-shadow: 4px 4px 0 var(--safe); }
    .result-inner.toxic { background: var(--toxic-bg); border-color: var(--toxic); box-shadow: 4px 4px 0 var(--toxic); }

    .verdict-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .verdict-icon {
      font-family: 'Space Mono', monospace;
      font-size: 28px;
      line-height: 1;
    }

    .verdict-text {}

    .verdict-main {
      font-family: 'Space Mono', monospace;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .safe  .verdict-main { color: var(--safe); }
    .toxic .verdict-main { color: var(--toxic); }

    .verdict-desc {
      font-size: 12px;
      color: var(--subtext);
      margin-top: 2px;
    }

    /* confidence */
    .conf-header {
      display: flex;
      justify-content: space-between;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--subtext);
      margin-bottom: 6px;
    }

    .bar-track {
      height: 10px;
      background: rgba(0,0,0,0.08);
      border: 1px solid rgba(0,0,0,0.15);
      position: relative;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      width: 0%;
      transition: width .5s cubic-bezier(.4,0,.2,1);
      /* pixel stripe effect */
      background-image: repeating-linear-gradient(
        90deg,
        transparent,
        transparent 6px,
        rgba(255,255,255,0.25) 6px,
        rgba(255,255,255,0.25) 8px
      );
    }

    .safe  .bar-fill { background-color: var(--safe); }
    .toxic .bar-fill { background-color: var(--toxic); }

    /* ---- error ---- */
    #error {
      display: none;
      width: 100%;
      max-width: 580px;
      margin-top: 16px;
      padding: 12px 16px;
      background: var(--toxic-bg);
      border: 2px solid var(--toxic);
      box-shadow: 3px 3px 0 var(--toxic);
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--toxic);
    }

    /* ---- loader dots ---- */
    .dots::after {
      content: '';
      animation: dots 1.2s steps(4, end) infinite;
    }

    @keyframes dots {
      0%   { content: ''; }
      25%  { content: '.'; }
      50%  { content: '..'; }
      75%  { content: '...'; }
    }

    /* ---- footer ---- */
    footer {
      margin-top: 32px;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: var(--border);
      letter-spacing: 1px;
      text-align: center;
    }
  </style>
</head>
<body>

  <header>
    <div class="tag">&#9632; ML Project</div>
    <h1>Toxic Comment<br/>Detector</h1>
    <p>Paste a comment. The model tells you if it's toxic.</p>
  </header>

  <div class="card pixel-box">
    <label class="input-label" for="commentInput">Comment</label>
    <textarea
      id="commentInput"
      placeholder="Type or paste a comment here..."
      maxlength="2000"
    ></textarea>
    <div class="meta-row">
      <span class="char-count" id="charCount">0 / 2000</span>
      <span class="hint">Ctrl + Enter to analyze</span>
    </div>

    <div class="btn-row">
      <button id="analyzeBtn" onclick="analyze()">Analyze</button>
      <button id="clearBtn" onclick="clearAll()">Clear</button>
    </div>
  </div>

  <div id="result">
    <div class="result-inner" id="resultCard">
      <div class="verdict-row">
        <div class="verdict-icon" id="verdictIcon"></div>
        <div class="verdict-text">
          <div class="verdict-main" id="verdictMain"></div>
          <div class="verdict-desc" id="verdictDesc"></div>
        </div>
      </div>
      <div class="conf-header">
        <span>Confidence</span>
        <span id="confValue"></span>
      </div>
      <div class="bar-track">
        <div class="bar-fill" id="barFill"></div>
      </div>
    </div>
  </div>

  <div id="error"></div>

  <footer>BiLSTM &nbsp;&#9632;&nbsp; Threshold 0.846 &nbsp;&#9632;&nbsp; Jigsaw Dataset</footer>

  <script>
    // Auto-detect: calls the same server that's serving this page
    // Works on localhost:8005 AND on Railway without any changes
    const API = window.location.origin;

    const commentInput = document.getElementById('commentInput');
    const charCount    = document.getElementById('charCount');
    const analyzeBtn   = document.getElementById('analyzeBtn');

    commentInput.addEventListener('input', () => {
      charCount.textContent = commentInput.value.length + ' / 2000';
    });

    commentInput.addEventListener('keydown', (e) => {
      if (e.ctrlKey && e.key === 'Enter') analyze();
    });

    async function analyze() {
      const text = commentInput.value.trim();

      document.getElementById('result').style.display = 'none';
      document.getElementById('error').style.display  = 'none';

      if (!text) { showError('Please enter a comment first.'); return; }

      analyzeBtn.disabled = true;
      analyzeBtn.innerHTML = '<span class="dots">Analyzing</span>';

      try {
        const res = await fetch(`${API}/predict`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text })
        });

        if (!res.ok) throw new Error(`Server error ${res.status}`);
        showResult(await res.json());

      } catch (err) {
        showError('Request failed: ' + err.message);
      } finally {
        analyzeBtn.disabled = false;
        analyzeBtn.textContent = 'Analyze';
      }
    }

    function showResult(data) {
      const isToxic = data.is_toxic;
      const pct     = (data.confidence * 100).toFixed(1);

      const card = document.getElementById('resultCard');
      card.className = 'result-inner ' + (isToxic ? 'toxic' : 'safe');

      document.getElementById('verdictIcon').textContent = isToxic ? '[!]' : '[✓]';
      document.getElementById('verdictMain').textContent = isToxic ? 'Toxic' : 'Safe';
      document.getElementById('verdictDesc').textContent = isToxic
        ? 'This comment appears harmful or offensive.'
        : 'This comment appears safe and non-offensive.';
      document.getElementById('confValue').textContent = pct + '%';

      const bar = document.getElementById('barFill');
      bar.style.width = '0%';
      setTimeout(() => { bar.style.width = pct + '%'; }, 30);

      document.getElementById('result').style.display = 'block';
    }

    function showError(msg) {
      const el = document.getElementById('error');
      el.textContent = '>> ERROR: ' + msg;
      el.style.display = 'block';
    }

    function clearAll() {
      commentInput.value = '';
      charCount.textContent = '0 / 2000';
      document.getElementById('result').style.display = 'none';
      document.getElementById('error').style.display  = 'none';
      commentInput.focus();
    }
  </script>

</body>
</html>
